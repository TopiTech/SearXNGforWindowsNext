use_default_settings:
  engines:
    keep_only:
      - duckduckgo
      - wikipedia
      - github
      - pubmed
      - arxiv
      - openlibrary
      - stackexchange
      - openstreetmap

general:
  debug: false
  instance_name: "SearXNG for Windows"

search:
  safe_search: 0
  autocomplete: "duckduckgo"
  formats:
    - html
    - json

server:
  base_url: "http://127.0.0.1:8888/"
  port: 8888
  bind_address: "127.0.0.1"
  secret_key: "9f2e5f8b6f1c4a8da1e4e9d5f0b2c7a49b1f9e2d3c4a5b6d7e8f9a0b1c2d3e4"
  limiter: false
  public_instance: false
  image_proxy: false
  method: "POST"
  default_http_headers:
    X-Content-Type-Options: nosniff
    X-Download-Options: noopen
    X-Robots-Tag: noindex, nofollow
    Referrer-Policy: no-referrer

valkey:
  url: false

outgoing:
  request_timeout: 6.0
  max_request_timeout: 12.0
  pool_connections: 100
  pool_maxsize: 10
  enable_http2: true
  retries: 1